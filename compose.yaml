  version: "3.9"

  services:
    redis:
      container_name: poker-redis
      image: redis:7-alpine
      restart: unless-stopped
      networks:
        - poker-net
      volumes:
        - redis-data:/data
      command: redis-server --appendonly yes --save 60 1

    server:
      container_name: pokerserver
      build: ./server
      restart: unless-stopped
      networks:
        - poker-net
        - newt-net
      environment:
        - NODE_ENV=production
        - REDIS_URL=redis://redis:6379
        - PORT=3001
        - LOBBY_TIMEOUT_HOURS=${LOBBY_TIMEOUT_HOURS:-24}
        - MAX_LOBBIES=${MAX_LOBBIES:-3}
      depends_on:
        - redis
      ports:
        - "3003:3001"

    client:
      container_name: pokerclient
      build:
        context: ./client
        args:
          - VITE_SERVER_URL=${VITE_SERVER_URL:-}
      restart: unless-stopped
      networks:
        - poker-net
        - newt-net
      ports:
        - "8982:80"
      depends_on:
        - server

  networks:
    poker-net:
      driver: bridge
    newt-net:
      external: true

  volumes:
    redis-data:
